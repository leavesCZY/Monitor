[versions]
android-plugin = "9.2.0"
kotlin-plugin = "2.3.21"
google-ksp-plugin = "2.3.7"
maven-publish-plugin = "0.36.0"

androidx-junit = "1.3.0"
androidx-espresso = "3.7.0"
androidx-appcompat = "1.7.1"
androidx-activity = "1.13.0"
androidx-room = "3.0.0-alpha03"
androidx-compose-bom = "2026.04.01"
androidx-compose-paging = "3.5.0-rc01"

junit = "4.13.2"
google-gson = "2.14.0"
squareup-okHttp = "5.3.2"
squareup-retrofit = "3.0.0"
leavesczy-monitor = "1.9.0"

[plugins]
android-application = { id = "com.android.application", version.ref = "android-plugin" }
android-library = { id = "com.android.library", version.ref = "android-plugin" }

androidx-room = { id = "androidx.room3", version.ref = "androidx-room" }
kotlin-compose = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin-plugin" }
google-ksp = { id = "com.google.devtools.ksp", version.ref = "google-ksp-plugin" }
maven-publish = { id = "com.vanniktech.maven.publish", version.ref = "maven-publish-plugin" }

app-android-application = { id = "app.android.application" }
app-android-library = { id = "app.android.library" }
app-android-compose = { id = "app.android.compose" }
app-androidx-room = { id = "app.androidx.room" }
app-library-publish = { id = "app.library.publish" }

[libraries]
android-gradle = { module = "com.android.tools.build:gradle", version.ref = "android-plugin" }
kotlin-gradle = { module = "org.jetbrains.kotlin:kotlin-gradle-plugin", version.ref = "kotlin-plugin" }
androidx-room-gradle = { module = "androidx.room3:room3-gradle-plugin", version.ref = "androidx-room" }
google-ksp-gradle = { module = "com.google.devtools.ksp:com.google.devtools.ksp.gradle.plugin", version.ref = "google-ksp-plugin" }
maven-publish-gradle = { module = "com.vanniktech.maven.publish:com.vanniktech.maven.publish.gradle.plugin", version.ref = "maven-publish-plugin" }

androidx-junit = { module = "androidx.test.ext:junit", version.ref = "androidx-junit" }
androidx-espresso = { module = "androidx.test.espresso:espresso-core", version.ref = "androidx-espresso" }
androidx-appcompat = { module = "androidx.appcompat:appcompat", version.ref = "androidx-appcompat" }
androidx-activity-compose = { module = "androidx.activity:activity-compose", version.ref = "androidx-activity" }
androidx-paging-compose = { module = "androidx.paging:paging-compose", version.ref = "androidx-compose-paging" }

androidx-room-runtime = { module = "androidx.room3:room3-runtime", version.ref = "androidx-room" }
androidx-room-compiler = { module = "androidx.room3:room3-compiler", version.ref = "androidx-room" }
androidx-room-paging = { module = "androidx.room3:room3-paging", version.ref = "androidx-room" }

androidx-compose-bom = { module = "androidx.compose:compose-bom", version.ref = "androidx-compose-bom" }
androidx-compose-ui = { module = "androidx.compose.ui:ui" }
androidx-compose-ui-util = { module = "androidx.compose.ui:ui-util" }
androidx-compose-ui-tooling = { module = "androidx.compose.ui:ui-tooling" }
androidx-compose-ui-tooling-preview = { module = "androidx.compose.ui:ui-tooling-preview" }
androidx-compose-ui-test = { module = "androidx.compose.ui:ui-test-junit4" }
androidx-compose-ui-test-manifest = { module = "androidx.compose.ui:ui-test-manifest" }
androidx-compose-foundation = { module = "androidx.compose.foundation:foundation" }
androidx-compose-material3 = { module = "androidx.compose.material3:material3" }
androidx-compose-material-icons-extended = { module = "androidx.compose.material:material-icons-extended" }

junit = { module = "junit:junit", version.ref = "junit" }

google-gson = { module = "com.google.code.gson:gson", version.ref = "google-gson" }

squareup-okHttp = { module = "com.squareup.okhttp3:okhttp", version.ref = "squareup-okHttp" }
squareup-okHttp-logging-interceptor = { module = "com.squareup.okhttp3:logging-interceptor", version.ref = "squareup-okHttp" }

squareup-retrofit = { module = "com.squareup.retrofit2:retrofit", version.ref = "squareup-retrofit" }
squareup-retrofit-converter-gson = { module = "com.squareup.retrofit2:converter-gson", version.ref = "squareup-retrofit" }

leavesczy-monitor = { module = "io.github.leavesczy:monitor", version.ref = "leavesczy-monitor" }
leavesczy-monitor-no-op = { module = "io.github.leavesczy:monitor-no-op", version.ref = "leavesczy-monitor" }